<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TA Companion — UW</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23B7A57A'/><text x='16' y='23' font-family='system-ui,sans-serif' font-size='22' font-weight='900' text-anchor='middle' fill='%234B2E83'>W</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Top Header ──────────────────────────────────────────────────────────── -->
<header id="header">
  <div class="header-left">
    <div class="logo">
      <span class="logo-w">W</span>
      <span class="logo-text">TA Companion</span>
    </div>
    <div id="status-badges" class="status-badges"></div>
  </div>
  <div class="header-center">
    <select id="sel-course" class="hdr-select">
      <option value="">— Loading courses… —</option>
    </select>
  </div>
  <div class="header-right">
    <button id="btn-sync-canvas" class="btn btn-ghost" disabled title="Pull all grades from Canvas">⟳ Sync Canvas</button>
    <button id="btn-export" class="btn btn-ghost" disabled title="Export current assignment grades as CSV">⬇ Export Grades</button>
    <div class="hdr-divider"></div>
    <button id="btn-notifications" class="btn btn-ghost notif-btn" onclick="showView('notifications')" title="Notifications">
      🔔 Notifications <span id="notif-badge" class="notif-badge" style="display:none">0</span>
    </button>
    <button id="hdr-username" class="hdr-user hdr-user-btn" onclick="toggleProfileCard()"></button>
    <button id="btn-logout" class="btn btn-ghost">Sign Out</button>
  </div>
</header>

<!-- ── Profile Side Card ──────────────────────────────────────────────────── -->
<div id="profile-card" class="profile-card hidden">
  <div class="profile-card-inner" id="profile-card-inner"></div>
</div>

<!-- ── Layout ──────────────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <nav class="sidebar" id="sidebar">
    <button class="nav-btn nav-btn-top active" data-view="overview">
      <span class="nav-icon">◇</span> Overview
    </button>
    <button class="nav-btn nav-btn-messages" data-view="messages">
      <span class="nav-icon">✉</span> Messages
    </button>

    <div class="sidebar-box">
      <div class="sidebar-box-hdr">Instructor Tools</div>
      <div class="sidebar-box-body">
        <button class="nav-btn nav-btn-presence" data-view="classpresence"><span class="nav-icon">◈</span> Class Presence</button>
        <button class="nav-btn" data-view="syllabus"><span class="nav-icon">▦</span> Instructor Syllabus</button>
        <button class="nav-btn" data-view="gradebook"><span class="nav-icon">■</span> Grade Book</button>
        <button class="nav-btn" data-view="ledger"><span class="nav-icon">▤</span> Grade Ledger</button>
        <button class="nav-btn" data-view="teams"><span class="nav-icon">◆</span> Teams</button>
        <button class="nav-btn" data-view="quiz"><span class="nav-icon">✎</span> Quiz &amp; Test Bank</button>
        <a class="nav-btn" href="https://1drv.ms/f/c/5ee3b6df8c3f77b7/IgC3dz-M37bjIIBe9PEUAAAAAU7s7FhF97a81Xvhsiu8_44?e=lHG12q" target="_blank" rel="noopener" style="text-decoration:none"><span class="nav-icon">☁</span> Shared OneDrive <span style="font-size:10px;opacity:0.6;margin-left:2px">↗</span></a>
        <button class="nav-btn" data-view="surveycreator"><span class="nav-icon">▦</span> Surveys &amp; Quizzes <span style="font-size:9px;background:#d97706;color:#fff;padding:1px 4px;border-radius:4px;margin-left:2px">BETA</span></button>
        <button class="nav-btn" data-view="panelgrading"><span class="nav-icon">▤</span> Panel Grading <span style="font-size:9px;background:#d97706;color:#fff;padding:1px 4px;border-radius:4px;margin-left:2px">BETA</span></button>
        <button class="nav-btn" data-view="peereval"><span class="nav-icon">◈</span> Peer Evaluation <span style="font-size:9px;background:#d97706;color:#fff;padding:1px 4px;border-radius:4px;margin-left:2px">BETA</span></button>
        <button class="nav-btn" data-view="content"><span class="nav-icon">▶</span> Course Content</button>
        <button class="nav-btn" data-view="manual"><span class="nav-icon">◈</span> Manage Students</button>
      </div>
    </div>

    <div class="sidebar-box">
      <div class="sidebar-box-hdr">Assignment Grading</div>
      <div class="sidebar-box-body" id="sidebar-assignments"></div>
    </div>

    <div class="sidebar-box" id="sidebar-other-box" style="display:none">
      <div class="sidebar-box-hdr">Other Assignments</div>
      <div class="sidebar-box-body" id="sidebar-other-assignments"></div>
    </div>

    <button class="nav-btn nav-btn-rompipalle" data-view="rompipalle">
      <span class="nav-icon">🏆</span> Rompipalle Competition
    </button>
  </nav>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main class="main" id="main-content">
    <!-- All views rendered by JS into here -->
    <div id="view-root"></div>
  </main>
</div>

<!-- ── Student Detail Modal ───────────────────────────────────────────────── -->
<div id="modal-backdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-student-name">Student Name</div>
        <div class="modal-subtitle" id="modal-student-meta"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-cols">
        <div class="modal-col">
          <div class="col-title">Submission</div>
          <div id="modal-submission-text" class="submission-text"></div>
        </div>
        <div class="modal-col">
          <div class="col-title">Scores</div>
          <div id="modal-ai-flag" class="ai-flag-banner" style="display:none"></div>
          <div id="modal-criteria-scores" class="criteria-scores"></div>
          <div class="score-totals" id="modal-score-totals"></div>
          <div class="field-group mt-1">
            <label>Notes / Feedback</label>
            <textarea id="modal-notes" class="input" rows="3" placeholder="Add notes for this student…"></textarea>
          </div>
          <div id="modal-ai-feedback" class="ai-feedback-box" style="display:none">
            <div class="col-title">AI Overall Feedback</div>
            <p id="modal-ai-feedback-text"></p>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="modal-grade-ai" class="btn btn-secondary">⟳ Re-grade with AI</button>
      <button id="modal-save" class="btn btn-primary">Save</button>
    </div>
  </div>
</div>

<!-- ── Progress overlay ───────────────────────────────────────────────────── -->
<div id="grade-progress-overlay" class="progress-overlay hidden">
  <div class="progress-card">
    <div class="progress-label" id="progress-label">Grading…</div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-sub" id="progress-sub"></div>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────────────────────────────────── -->
<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
