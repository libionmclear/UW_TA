<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TA Companion — Sign In</title>
  <style>
    :root {
      --uw-purple:  #4B2E83;
      --uw-purple2: #3a2268;
      --uw-gold:    #B7A57A;
      --border:     #dde1ec;
      --bg:         #f0f2f7;
      --radius:     8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.12);
      width: 100%; max-width: 380px; overflow: hidden;
    }

    .card-header {
      background: var(--uw-purple); color: #fff;
      padding: 28px 32px 24px; text-align: center;
    }
    .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
    .logo-w {
      background: var(--uw-gold); color: var(--uw-purple);
      font-weight: 900; font-size: 20px; width: 36px; height: 36px;
      border-radius: 8px; display: grid; place-items: center;
    }
    .logo-text { font-weight: 700; font-size: 18px; }
    .card-header p { font-size: 13px; opacity: .75; margin-top: 2px; }

    .card-body { padding: 28px 32px; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: #6b7280; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px;
    }
    .field input {
      width: 100%; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 12px; font-size: 14px; transition: border-color .15s;
    }
    .field input:focus { outline: none; border-color: var(--uw-purple); }

    .btn-login {
      width: 100%; background: var(--uw-gold); color: var(--uw-purple2);
      border: none; border-radius: var(--radius); padding: 11px;
      font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px;
      transition: filter .15s;
    }
    .btn-login:hover { filter: brightness(1.07); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }

    .error {
      background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b;
      border-radius: var(--radius); padding: 10px 12px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .error.show { display: block; }

    .footer { margin-top: 24px; font-size: 12px; color: #9ca3af; text-align: center; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo">
      <div class="logo-w">W</div>
      <span class="logo-text">TA Companion</span>
    </div>
    <p>University of Washington</p>
  </div>
  <div class="card-body">
    <div class="error" id="error-msg">Invalid username or password.</div>
    <form id="login-form">
      <div class="field">
        <label>Username</label>
        <input id="username" type="text" autocomplete="username" required autofocus />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="btn-login" type="submit" id="btn-submit">Sign In</button>
    </form>
  </div>
</div>

<div class="footer">TA Companion · Secure Access Only</div>

<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const errEl = document.getElementById('error-msg');
    errEl.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch {
      errEl.textContent = 'Server error. Is the server running?';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
